<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SubStudy — Local Pipeline</title>
    <meta name="description" content="Process videos locally into transcripts, subtitles, and summaries. Video stays on your machine." />

    <!-- Tailwind CSS Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        accent: '#7C5CFF',
                        'accent-hover': '#6B4CE6',
                        surface: '#111116',
                        panel: '#18181F',
                        border: '#26262E',
                    },
                    fontFamily: {
                        sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'],
                    },
                    boxShadow: {
                        glow: '0 0 20px rgba(124,92,255,0.45)',
                        'glow-lg': '0 0 40px rgba(124,92,255,0.35)',
                    }
                }
            }
        }
    </script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

    <!-- React & ReactDOM (UMD) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

    <!-- Babel Standalone (JSX only, no TS generics needed for inline scripts) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        * { box-sizing: border-box; }
        body {
            background-color: #0D0D12;
            color: #F0F0F5;
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
            margin: 0;
        }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #26262E; border-radius: 99px; }

        .glow-btn:not(:disabled):hover {
            box-shadow: 0 0 30px rgba(124, 92, 255, 0.55);
            transform: translateY(-1px);
        }
        .glow-btn {
            transition: box-shadow 0.2s ease, transform 0.2s ease, background-color 0.2s ease;
            box-shadow: 0 0 18px rgba(124, 92, 255, 0.35);
        }
        .glow-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            box-shadow: none;
        }

        .dropzone {
            transition: border-color 0.2s ease, background-color 0.2s ease;
        }
        .dropzone.dragover {
            border-color: #7C5CFF !important;
            background-color: rgba(124, 92, 255, 0.06) !important;
        }

        select option { background: #18181F; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .animate-fadein {
            animation: fadeIn 0.45s cubic-bezier(0.22, 1, 0.36, 1) both;
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0.3; }
        }
        .badge-dot {
            display: inline-block;
            width: 6px; height: 6px;
            border-radius: 99px;
            background: #7C5CFF;
            animation: pulse-dot 2s ease-in-out infinite;
        }
    </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useRef, useCallback } = React;

// ─── Constants ────────────────────────────────────────────────────────────────
const BASE_URL = "/api/v1";
const ACCEPTED = ['.mp4', '.mkv', '.mov', '.avi', '.webm'];
const MAX_MB   = 500;

const JOBS_KEY   = 'substudy_jobs';
const ACTIVE_KEY = 'substudy_active_job_id';
const JOBS_META_KEY = 'substudy_jobs_meta';

const SOURCE_LANGS = [
    { value: 'Auto',    label: 'Auto Detect' },
    { value: 'English', label: 'English'     },
    { value: 'Arabic',  label: 'Arabic'      },
];
const TARGET_LANGS = [
    { value: 'English',      label: 'English'      },
    { value: 'Arabic',      label: 'Arabic'       },
];

// ─── Button ───────────────────────────────────────────────────────────────────
function Button({ children, variant = 'primary', fullWidth, disabled, onClick, className = '' }) {
    const base = `inline-flex items-center justify-center gap-2 font-semibold rounded-xl text-sm transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-accent focus:ring-offset-2 focus:ring-offset-[#0D0D12] ${fullWidth ? 'w-full' : ''} ${className}`;
    const styles = {
        primary:   `bg-accent text-white px-6 py-3 glow-btn`,
        secondary: `bg-panel text-gray-300 border border-border px-6 py-3 hover:border-gray-500 hover:text-white`,
        ghost:     `text-gray-400 px-3 py-2 hover:text-white hover:bg-panel rounded-lg`,
    };
    return (
        <button
            onClick={onClick}
            disabled={disabled}
            className={`${base} ${styles[variant]}`}
        >
            {children}
        </button>
    );
}

// ─── Select ───────────────────────────────────────────────────────────────────
function SelectField({ id, label, value, onChange, options }) {
    return (
        <div className="flex flex-col gap-2">
            <label htmlFor={id} className="text-[11px] font-semibold text-gray-500 uppercase tracking-widest">
                {label}
            </label>
            <div className="relative">
                <select
                    id={id}
                    value={value}
                    onChange={onChange}
                    className="w-full appearance-none bg-[#0D0D12] border border-border text-gray-200 text-sm py-3 pl-4 pr-10 rounded-xl focus:outline-none focus:ring-2 focus:ring-accent transition-colors cursor-pointer"
                >
                    {options.map(o => <option key={o.value} value={o.value}>{o.label}</option>)}
                </select>
                <div className="pointer-events-none absolute inset-y-0 right-3 flex items-center text-gray-500">
                    <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 9l-7 7-7-7"/>
                    </svg>
                </div>
            </div>
        </div>
    );
}

// ─── UploadDropzone ───────────────────────────────────────────────────────────
function UploadDropzone({ file, onFile, error }) {
    const [dragover, setDragover] = useState(false);
    const inputRef = useRef(null);

    const validate = useCallback((f) => {
        if (!f) return;
        const ext = f.name.substring(f.name.lastIndexOf('.')).toLowerCase();
        if (!ACCEPTED.includes(ext)) { onFile(null, 'Only video files are supported (.mp4, .mkv, .mov, .avi, .webm)'); return; }
        if (f.size > MAX_MB * 1024 * 1024) { onFile(null, `File exceeds the ${MAX_MB} MB limit.`); return; }
        onFile(f, null);
    }, [onFile]);

    const onDrop = (e) => {
        e.preventDefault(); setDragover(false);
        if (e.dataTransfer.files?.[0]) validate(e.dataTransfer.files[0]);
    };

    return (
        <div
            className={`dropzone w-full rounded-2xl border-2 border-dashed border-border flex flex-col items-center justify-center p-10 cursor-pointer select-none ${dragover ? 'dragover' : 'hover:border-gray-600'} ${error ? 'border-red-500/60 bg-red-500/5' : ''}`}
            style={{ minHeight: 220 }}
            onClick={() => inputRef.current?.click()}
            onDragOver={e => { e.preventDefault(); setDragover(true); }}
            onDragLeave={e => { e.preventDefault(); setDragover(false); }}
            onDrop={onDrop}
        >
            <input
                ref={inputRef}
                type="file"
                accept={ACCEPTED.join(',')}
                className="hidden"
                onChange={e => validate(e.target.files?.[0])}
            />

            {file ? (
                // File selected state
                <div className="flex flex-col items-center gap-3 text-center animate-fadein">
                    <div className="w-14 h-14 rounded-2xl bg-accent/15 flex items-center justify-center">
                        <svg className="w-7 h-7 text-accent" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="1.5" d="M15 10l4.553-2.069A1 1 0 0121 8.87v6.26a1 1 0 01-1.447.894L15 14M3 8a2 2 0 012-2h10a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2V8z"/>
                        </svg>
                    </div>
                    <div>
                        <p className="font-semibold text-white text-base">{file.name}</p>
                        <p className="text-sm text-gray-500 mt-1">{(file.size / (1024 * 1024)).toFixed(1)} MB</p>
                    </div>
                    <span className="text-xs text-gray-600 mt-1">Click or drop to replace</span>
                </div>
            ) : error ? (
                // Error state
                <div className="flex flex-col items-center gap-3 text-center animate-fadein">
                    <div className="w-14 h-14 rounded-2xl bg-red-500/10 flex items-center justify-center">
                        <svg className="w-7 h-7 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="1.5" d="M12 9v3.75m9-.75a9 9 0 11-18 0 9 9 0 0118 0zm-9 3.75h.008v.008H12v-.008z"/>
                        </svg>
                    </div>
                    <p className="text-red-400 font-medium text-sm max-w-xs">{error}</p>
                    <span className="text-xs text-gray-600">Click to try again</span>
                </div>
            ) : (
                // Default idle state
                <div className="flex flex-col items-center gap-4 text-center">
                    <div className="w-14 h-14 rounded-2xl bg-panel border border-border flex items-center justify-center">
                        <svg className="w-7 h-7 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="1.5" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5"/>
                        </svg>
                    </div>
                    <div>
                        <p className="text-gray-300 font-medium">
                            Drop a video here or{' '}
                            <span className="text-accent font-semibold">click to browse</span>
                        </p>
                        <p className="text-xs text-gray-600 mt-2">MP4, MKV, MOV, AVI, WebM · up to {MAX_MB} MB</p>
                    </div>
                </div>
            )}
        </div>
    );
}

function jobStatusColor(status) {
    switch (status) {
        case 'completed': return 'text-green-400';
        case 'failed':    return 'text-red-400';
        case 'canceled':  return 'text-gray-500';
        default:          return 'text-accent';
    }
}

function jobStatusLabel(status) {
    if (!status) return 'Processing';
    return status.charAt(0).toUpperCase() + status.slice(1);
}

// ─── Sidebar ──────────────────────────────────────────────────────────────────
function Sidebar({ jobs, activeJobId, onNewJob, onSelectJob, onDeleteJob }) {
    return (
        <aside className="w-60 shrink-0 h-screen bg-panel border-r border-border flex flex-col p-5 gap-6">
            <div className="flex items-center gap-2.5 pt-1">
                <div className="w-7 h-7 rounded-lg bg-accent flex items-center justify-center shadow-glow shrink-0">
                    <svg className="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.2" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3"/>
                    </svg>
                </div>
                <span className="text-white font-bold text-lg tracking-tight">SubStudy</span>
            </div>

            <Button variant="primary" fullWidth onClick={onNewJob}>
                <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.2" d="M12 4v16m8-8H4"/>
                </svg>
                New Job
            </Button>

            <div className="flex-1 overflow-y-auto">
                <p className="text-[10px] font-bold text-gray-600 uppercase tracking-widest mb-4">Recent</p>
                {jobs.length === 0 ? (
                    <div className="flex flex-col items-center gap-3 py-10 opacity-60">
                        <svg className="w-8 h-8 text-gray-700" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="1.5" d="M3.375 19.5h17.25m-17.25 0a1.125 1.125 0 01-1.125-1.125M3.375 19.5h7.5c.621 0 1.125-.504 1.125-1.125m-9.75 0V5.625m0 12.75v-1.5c0-.621.504-1.125 1.125-1.125m18.375 2.625V5.625m0 12.75c0 .621-.504 1.125-1.125 1.125m1.125-1.125v-1.5c0-.621-.504-1.125-1.125-1.125m0 3.75h-7.5A1.125 1.125 0 0112 18.375m9.75-12.75c0-.621-.504-1.125-1.125-1.125H3.375c-.621 0-1.125.504-1.125 1.125m19.5 0v1.5c0 .621-.504 1.125-1.125 1.125M2.25 5.625v1.5c0 .621.504 1.125 1.125 1.125m0 0h17.25m-17.25 0h7.5c.621 0 1.125.504 1.125 1.125M3.375 8.25c-.621 0-1.125.504-1.125 1.125v1.5c0 .621.504 1.125 1.125 1.125m17.25-3.75h-7.5c-.621 0-1.125.504-1.125 1.125m8.625-1.125c.621 0 1.125.504 1.125 1.125v1.5c0 .621-.504 1.125-1.125 1.125"/>
                        </svg>
                        <p className="text-xs text-gray-600 font-medium">No jobs yet</p>
                    </div>
                ) : (
                    <div className="flex flex-col gap-2">
                        {jobs.map(job => {
                            const id = String(job.job_id);
                            const isActive = id === activeJobId;
                            const isRunning = job.status === 'processing';
                            return (
                                <div
                                    key={id}
                                    className={`group relative rounded-xl border transition-colors ${isActive ? 'border-accent/60 bg-accent/10' : 'border-border bg-[#0D0D12] hover:border-gray-600'}`}
                                >
                                    <button
                                        type="button"
                                        onClick={() => onSelectJob(id)}
                                        className="w-full text-left p-3 pr-9"
                                    >
                                        <p className="text-xs text-gray-200 font-medium truncate mb-1">
                                            {job.fileName || `${id.slice(0, 8)}…`}
                                        </p>
                                        <div className="flex justify-between items-center gap-2">
                                        <span className="text-[10px] text-gray-600 truncate">
                                            {(job.source_lang && job.target_lang)
                                                ? `${job.source_lang} → ${job.target_lang}`
                                                : '—'}
                                        </span>
                                            <span className={`text-[10px] font-semibold shrink-0 ${jobStatusColor(job.status)} ${isRunning ? 'animate-pulse' : ''}`}>
                                                {jobStatusLabel(job.status)}
                                            </span>
                                        </div>
                                    </button>
                                    <button
                                        type="button"
                                        title={isRunning ? 'Cancel the job before deleting' : 'Delete job'}
                                        disabled={isRunning}
                                        onClick={(e) => { e.stopPropagation(); onDeleteJob(id); }}
                                        className={`absolute top-2.5 right-2 p-1 rounded-md transition-colors ${isRunning ? 'opacity-30 cursor-not-allowed text-gray-600' : 'text-gray-600 hover:text-red-400 hover:bg-red-500/15'}`}
                                    >
                                        <svg className="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                                        </svg>
                                    </button>
                                </div>
                            );
                        })}
                    </div>
                )}
            </div>

            <div className="text-[10px] text-gray-700 font-mono">v1.0 · local pipeline</div>
        </aside>
    );
}

// ─── Upload View ──────────────────────────────────────────────────────────────
function UploadView({ onSubmit }) {
    const [file, setFile]           = useState(null);
    const [fileError, setFileError] = useState(null);
    const [sourceLang, setSource]   = useState('Auto');
    const [targetLang, setTarget]   = useState('English');

    const handleFile = useCallback((f, err) => {
        setFile(f);
        setFileError(err);
    }, []);

    return (
        <div className="flex-1 overflow-y-auto">
            {/* Glow blob */}
            <div className="pointer-events-none fixed top-0 left-1/2 -translate-x-1/4 w-[700px] h-[400px] bg-accent/10 blur-[120px] rounded-full" />

            <div className="max-w-3xl mx-auto px-10 py-16 relative z-10 animate-fadein">

                {/* Hero */}
                <div className="mb-12">
                    <div className="inline-flex items-center gap-2 px-3 py-1.5 rounded-full border border-border bg-panel text-[11px] font-semibold text-gray-500 uppercase tracking-widest mb-7">
                        <span className="badge-dot"></span>
                        V1 · Local Pipeline
                    </div>

                    <h1 className="text-[3.2rem] font-bold leading-[1.15] tracking-tight text-white mb-5">
                        Turn any video into{' '}
                        <span className="bg-gradient-to-r from-accent to-[#B79EFF] bg-clip-text text-transparent">
                            transcripts,&nbsp;subtitles,<br />and summaries.
                        </span>
                    </h1>

                    <p className="text-gray-400 text-base leading-relaxed max-w-xl">
                        A 7-stage ML pipeline that runs on your machine.
                        Video stays local — transcripts are sent to GitHub Models for translation and summarization.
                    </p>
                </div>

                {/* Upload card */}
                <div className="bg-panel border border-border rounded-2xl p-8 shadow-xl">
                    <div className="mb-6">
                        <h2 className="text-xl font-semibold text-white">Upload a video</h2>
                        <p className="text-sm text-gray-500 mt-1">Supports MP4, MKV, MOV, AVI and WebM. Maximum {MAX_MB} MB.</p>
                    </div>

                    <UploadDropzone file={file} onFile={handleFile} error={fileError} />

                    <div className="mt-5 p-4 rounded-xl border border-border/80 bg-[#0D0D12]/60">
                        <p className="text-xs text-gray-400 leading-relaxed">
                            <span className="font-semibold text-gray-300">Privacy:</span> Your video file is processed entirely on this machine.
                            Transcripts and subtitle text are sent to GitHub Models for translation and summarization.
                            No video is uploaded to the cloud.
                        </p>
                    </div>

                    <div className="mt-6 flex flex-col sm:flex-row gap-5 items-end">
                        <div className="flex-1 grid grid-cols-2 gap-4">
                            <SelectField
                                id="source-lang"
                                label="Source Language"
                                value={sourceLang}
                                onChange={e => setSource(e.target.value)}
                                options={SOURCE_LANGS}
                            />
                            <SelectField
                                id="target-lang"
                                label="Target Language"
                                value={targetLang}
                                onChange={e => setTarget(e.target.value)}
                                options={TARGET_LANGS}
                            />
                        </div>
                        <Button
                            variant="primary"
                            disabled={!file}
                            onClick={() => file && onSubmit(file, sourceLang, targetLang)}
                            className="px-8 py-3 whitespace-nowrap"
                        >
                            Start Processing
                            <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13.5 4.5L21 12m0 0l-7.5 7.5M21 12H3"/>
                            </svg>
                        </Button>
                    </div>
                </div>
            </div>
        </div>
    );
}

// ─── Processing View ──────────────────────────────────────────────────────────
const STAGES = [
    'Video Validation',
    'Audio Extraction',
    'Voice Detection (VAD)',
    'Transcription (STT)',
    'Subtitle Export & Translation',
    'Summarization',
];

function ProcessingView({ progress, onReset, isCanceling }) {
    const stageIndex = Math.floor((progress / 100) * STAGES.length);
    return (
        <div className="flex-1 flex items-center justify-center p-10 animate-fadein">
            <div className="bg-panel border border-border rounded-2xl p-10 w-full max-w-xl shadow-xl">
                <h2 className="text-2xl font-bold text-white mb-2">Processing your video…</h2>
                <p className="text-gray-500 text-sm mb-8">This may take a few minutes depending on the file length.</p>

                {/* Overall progress bar */}
                <div className="w-full h-2 bg-[#0D0D12] rounded-full overflow-hidden mb-6">
                    <div
                        className="h-full bg-gradient-to-r from-accent to-[#B79EFF] rounded-full transition-all duration-500"
                        style={{ width: `${progress}%` }}
                    />
                </div>

                {/* Stages */}
                <div className="flex flex-col gap-3 mb-8">
                    {STAGES.map((stage, i) => {
                        const done    = i < stageIndex;
                        const active  = i === stageIndex;
                        return (
                            <div key={stage} className={`flex items-center gap-3 transition-opacity duration-300 ${i > stageIndex ? 'opacity-30' : ''}`}>
                                <div className={`w-5 h-5 rounded-full flex items-center justify-center shrink-0 ${done ? 'bg-accent' : active ? 'border-2 border-accent' : 'border border-border bg-[#0D0D12]'}`}>
                                    {done && (
                                        <svg className="w-3 h-3 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M4.5 12.75l6 6 9-13.5"/>
                                        </svg>
                                    )}
                                    {active && <span className="badge-dot" style={{width:8,height:8}}/>}
                                </div>
                                <span className={`text-sm ${done ? 'text-gray-400 line-through' : active ? 'text-white font-semibold' : 'text-gray-600'}`}>{stage}</span>
                            </div>
                        );
                    })}
                </div>

                <Button
                    variant="ghost"
                    onClick={onReset}
                    disabled={isCanceling}
                    className="text-sm text-gray-600 hover:text-red-400 disabled:opacity-50"
                >
                    {isCanceling ? 'Canceling…' : 'Cancel job'}
                </Button>
            </div>
        </div>
    );
}

// ─── Error View ───────────────────────────────────────────────────────────────
function ErrorView({ message, onReset }) {
    return (
        <div className="flex-1 flex items-center justify-center p-10 animate-fadein">
            <div className="bg-panel border border-red-500/30 rounded-2xl p-10 w-full max-w-md shadow-xl text-center">
                <div className="w-14 h-14 rounded-full bg-red-500/10 flex items-center justify-center mx-auto mb-5">
                    <svg className="w-7 h-7 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="1.5" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z"/>
                    </svg>
                </div>
                <h2 className="text-xl font-bold text-white mb-2">Something went wrong</h2>
                <p className="text-sm text-gray-400 mb-8 leading-relaxed">{message}</p>
                <Button variant="primary" onClick={onReset}>Try Again</Button>
            </div>
        </div>
    );
}

function downloadSrt(content, filename = 'subtitles.srt') {
    const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
}

// ─── Done View ────────────────────────────────────────────────────────────────

    const [transcriptTab, setTranscriptTab] = useState('source');

    const transcripts = result?.transcripts || {};
    const analysis = result?.analysis || {};
    const detailedPoints = Array.isArray(analysis.detailed_points) ? analysis.detailed_points : [];

    return (
        <div className="flex-1 overflow-y-auto p-10 animate-fadein">
            <div className="max-w-2xl mx-auto">
                <div className="flex items-center gap-3 mb-8">
                    <div className="w-10 h-10 rounded-full bg-accent/15 flex items-center justify-center">
                        <svg className="w-5 h-5 text-accent" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.2" d="M4.5 12.75l6 6 9-13.5"/>
                        </svg>
                    </div>
                    <h2 className="text-2xl font-bold text-white">Processing complete</h2>
                </div>

                {(result?.srt_output || result?.original_srt) && (
                    <div className="bg-panel border border-border rounded-xl p-5 mb-4">
                        <p className="text-[10px] font-bold text-gray-600 uppercase tracking-widest mb-3">Subtitles</p>
                        <div className="flex flex-wrap gap-3">
                            {result?.srt_output && (
                                <Button variant="secondary" onClick={() => downloadSrt(result.srt_output, 'translated.srt')}>
                                    Download Translated SRT
                                </Button>
                            )}
                            {result?.original_srt && (
                                <Button variant="secondary" onClick={() => downloadSrt(result.original_srt, 'original.srt')}>
                                    Download Original SRT
                                </Button>
                            )}
                        </div>
                    </div>
                )}

                {analysis.short_summary && (
                    <div className="bg-panel border border-border rounded-xl p-5 mb-4">
                        <p className="text-[10px] font-bold text-gray-600 uppercase tracking-widest mb-3">Summary</p>
                        <p className="text-sm text-gray-200 leading-relaxed">{analysis.short_summary}</p>
                    </div>

                {detailedPoints.length > 0 && (
                    <div className="bg-panel border border-border rounded-xl p-5 mb-4">
                        <p className="text-[10px] font-bold text-gray-600 uppercase tracking-widest mb-3">Key Points</p>
                        <ul className="space-y-2">
                            {detailedPoints.map((point, i) => (
                                <li key={i} className="flex gap-2 text-sm text-gray-300 leading-relaxed">
                                    <span className="text-accent shrink-0 mt-0.5">•</span>
                                    <span>{point}</span>

                            ))}
                        </ul>
                    </div>
                )}

                {(transcripts.source || transcripts.translated) && (
                    <div className="bg-panel border border-border rounded-xl p-5 mb-4">
                        <p className="text-[10px] font-bold text-gray-600 uppercase tracking-widest mb-3">Transcript</p>
                        <div className="flex gap-2 mb-4">
                            {transcripts.source && (
                                <button
                                    type="button"
                                    onClick={() => setTranscriptTab('source')}
                                    className={`px-3 py-1.5 rounded-lg text-xs font-semibold transition-colors ${transcriptTab === 'source' ? 'bg-accent text-white' : 'bg-[#0D0D12] text-gray-500 hover:text-gray-300'}`}
                                >
                                    Original
                                </button>
                            )}
                            {transcripts.translated && (
                                <button
                                    type="button"
                                    onClick={() => setTranscriptTab('translated')}
                                    className={`px-3 py-1.5 rounded-lg text-xs font-semibold transition-colors ${transcriptTab === 'translated' ? 'bg-accent text-white' : 'bg-[#0D0D12] text-gray-500 hover:text-gray-300'}`}
                                >
                                    Translated
                                </button>
                            )}
                        </div>
                        <p className="text-sm text-gray-300 leading-relaxed whitespace-pre-wrap max-h-64 overflow-y-auto">
                            {transcriptTab === 'translated' ? transcripts.translated : transcripts.source}
                        </p>
                    </div>
                )}

                <div className="mt-8">
                    <Button variant="primary" onClick={onReset}>
                        <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 4v16m8-8H4"/>
                        </svg>
                        Process Another Video
                    </Button>
                </div>
            </div>
        </div>
    );
}

// ─── API Layer ────────────────────────────────────────────────────────────────
async function startJob(file, sourceLang, targetLang) {
    const form = new FormData();
    form.append('file', file);
    form.append('source_lang', sourceLang);
    form.append('target_lang', targetLang);

    const res = await fetch(`${BASE_URL}/process`, {
        method: 'POST',
        body: form,
    });

    if (!res.ok) {
        const detail = await res.json().catch(() => ({}));
        const message = typeof detail?.detail === 'string'
            ? detail.detail
            : `Server error ${res.status}`;
        throw new Error(message);
    }
    return (await res.json()).job_id;
}

async function pollJob(jobId) {
    const res = await fetch(`${BASE_URL}/status/${jobId}`);
    if (!res.ok) throw new Error(`Poll error ${res.status}`);
    return res.json();
}

async function cancelJob(jobId) {
    const maxAttempts = 5;
    for (let attempt = 0; attempt < maxAttempts; attempt++) {
        const res = await fetch(`${BASE_URL}/cancel/${jobId}`, { method: 'POST' });
        if (res.ok) return;
        if (res.status === 404 && attempt < maxAttempts - 1) {
            await new Promise(r => setTimeout(r, 400));
            continue;
        }
        const detail = await res.json().catch(() => ({}));
        throw new Error(detail?.detail || `Cancel failed (${res.status})`);
    }
}

async function deleteJob(jobId) {
    const res = await fetch(`${BASE_URL}/jobs/${jobId}`, { method: 'DELETE' });
    if (!res.ok) {
        const detail = await res.json().catch(() => ({}));
        throw new Error(detail?.detail || `Delete failed (${res.status})`);
    }
}

function loadJobIds() {
    try { return JSON.parse(localStorage.getItem(JOBS_KEY) || '[]'); }
    catch { return []; }
}

function saveJobIds(ids) {
    localStorage.setItem(JOBS_KEY, JSON.stringify(ids));
}

function loadJobsMeta() {
    try { return JSON.parse(localStorage.getItem(JOBS_META_KEY) || '{}'); }
    catch { return {}; }
}

function saveJobMeta(jobId, patch) {
    const id = String(jobId);
    const all = loadJobsMeta();
    all[id] = { ...(all[id] || {}), ...patch };
    localStorage.setItem(JOBS_META_KEY, JSON.stringify(all));
}

function jobFromApi(data) {
    const id = String(data.job_id);
    const meta = loadJobsMeta()[id] || {};
    return {
        job_id: id,
        status: data.status,
        progress: data.progress ?? 0,
        result: data.result ?? null,
        error_message: data.error_message ?? null,
        source_lang: data.source_lang || meta.source_lang || null,
        target_lang: data.target_lang || meta.target_lang || null,
        fileName: data.file_name || meta.fileName || null,
    };
}

function patchFromApi(data) {
    return {
        job_id: String(data.job_id),
        status: data.status,
        progress: data.progress ?? 0,
        result: data.result ?? undefined,
        error_message: data.error_message ?? undefined,
        source_lang: data.source_lang ?? undefined,
        target_lang: data.target_lang ?? undefined,
        fileName: data.file_name ?? undefined,
    };
}

function upsertJobList(list, patch) {
    const id = String(patch.job_id);
    const idx = list.findIndex(j => String(j.job_id) === id);
    if (idx >= 0) {
        const next = [...list];
        next[idx] = { ...next[idx], ...patch, job_id: id };
        return next;
    }
    return [{ ...patch, job_id: id }, ...list];
}

// ─── App Root ─────────────────────────────────────────────────────────────────
function App() {
    const [appState,    setAppState]    = useState('idle');
    const [progress,    setProgress]    = useState(0);
    const [result,      setResult]      = useState(null);
    const [errMsg,      setErrMsg]      = useState('');
    const [jobs,        setJobs]        = useState([]);
    const [activeJobId, setActiveJobId] = useState(null);
    const [isCanceling, setIsCanceling] = useState(false);
    const pollRef = useRef(null);

    const stopPolling = () => {
        clearTimeout(pollRef.current);
        pollRef.current = null;
    };

    const applyJobUpdate = useCallback((patch) => {
        setJobs(prev => upsertJobList(prev, patch));
    }, []);

    const beginPolling = useCallback((jobId) => {
        stopPolling();
        const MAX_MS = 10 * 60 * 1000;
        const start  = Date.now();

        const tick = async () => {
            if (Date.now() - start > MAX_MS) {
                localStorage.removeItem(ACTIVE_KEY);
                applyJobUpdate({ job_id: jobId, status: 'failed', progress: 100 });
                setErrMsg('Processing timed out. Check the backend logs.');
                setAppState('error');
                setActiveJobId(null);
                return;
            }
            try {
                const data = await pollJob(jobId);
                const progressVal = data.progress ?? 0;
                setProgress(progressVal);
                applyJobUpdate(patchFromApi(data));

                if (data.status === 'completed') {
                    localStorage.removeItem(ACTIVE_KEY);
                    setResult(data.result);
                    setAppState('done');
                    setActiveJobId(jobId);
                    return;
                }
                if (data.status === 'failed') {
                    localStorage.removeItem(ACTIVE_KEY);
                    setErrMsg(data.error_message || 'An unknown error occurred.');
                    setAppState('error');
                    setActiveJobId(jobId);
                    return;
                }
                if (data.status === 'canceled') {
                    localStorage.removeItem(ACTIVE_KEY);
                    setActiveJobId(null);
                    setProgress(progressVal);
                    setAppState('idle');
                    return;
                }
                pollRef.current = setTimeout(tick, 2000);
            } catch (e) {
                pollRef.current = setTimeout(tick, 4000);
            }
        };
        tick();
    }, [applyJobUpdate]);

    React.useEffect(() => {
        const hydrate = async () => {
            const legacy = localStorage.getItem('substudy_job_id');
            if (legacy) {
                const ids = loadJobIds();
                if (!ids.includes(legacy)) saveJobIds([legacy, ...ids]);
                localStorage.removeItem('substudy_job_id');
                if (!localStorage.getItem(ACTIVE_KEY)) localStorage.setItem(ACTIVE_KEY, legacy);
            }

            const savedIds = loadJobIds();
            if (savedIds.length === 0) return;

            const hydrated = [];
            for (const id of savedIds) {
                try {
                    const data = await pollJob(id);
                    hydrated.push(jobFromApi(data));
                } catch (e) {
                    const meta = loadJobsMeta()[id];
                    if (meta) {
                        hydrated.push({ job_id: id, status: 'unknown', progress: 0, ...meta });
                    }
                }
            }
            if (hydrated.length > 0) setJobs(hydrated);

            const active = localStorage.getItem(ACTIVE_KEY);
            if (active && hydrated.some(j => j.job_id === active)) {
                const activeJob = hydrated.find(j => j.job_id === active);
                setActiveJobId(active);
                if (activeJob.status === 'processing') {
                    setAppState('processing');
                    setProgress(activeJob.progress ?? 0);
                    beginPolling(active);
                } else if (activeJob.status === 'completed') {
                    setResult(activeJob.result);
                    setAppState('done');
                } else if (activeJob.status === 'failed') {
                    setErrMsg(activeJob.error_message || 'An unknown error occurred.');
                    setAppState('error');
                } else if (activeJob.status === 'canceled') {
                    localStorage.removeItem(ACTIVE_KEY);
                    setActiveJobId(null);
                    setAppState('idle');
                }
            } else if (active) {
                localStorage.removeItem(ACTIVE_KEY);
            }
        };
        hydrate();
        return () => stopPolling();
    }, [beginPolling]);

    const handleSubmit = async (file, sourceLang, targetLang) => {
        setAppState('uploading');
        try {
            const jobId = await startJob(file, sourceLang, targetLang);
            const id = String(jobId);

            applyJobUpdate({
                job_id: id,
                status: 'processing',
                progress: 0,
                source_lang: sourceLang,
                target_lang: targetLang,
                fileName: file.name,
            });
            saveJobMeta(id, { source_lang: sourceLang, target_lang: targetLang, fileName: file.name });

            const ids = loadJobIds();
            if (!ids.includes(id)) saveJobIds([id, ...ids]);

            localStorage.setItem(ACTIVE_KEY, id);
            setActiveJobId(id);
            setAppState('processing');
            setProgress(0);
            setResult(null);
            beginPolling(id);
        } catch (e) {
            setErrMsg(e.message || "Couldn't reach the server. Is the backend running on port 8000?");
            setAppState('error');
        }
    };

    const handleCancel = async () => {
        const jobId = activeJobId || localStorage.getItem(ACTIVE_KEY);
        if (!jobId || isCanceling) return;

        setIsCanceling(true);
        stopPolling();

        try {
            await cancelJob(jobId);
            applyJobUpdate({ job_id: jobId, status: 'canceled' });
        } catch (e) {
            setErrMsg(e.message || 'Could not cancel job on the server.');
            setAppState('error');
            setIsCanceling(false);
            return;
        }

        localStorage.removeItem(ACTIVE_KEY);
        setActiveJobId(null);
        setProgress(0);
        setResult(null);
        setErrMsg('');
        setAppState('idle');
        setIsCanceling(false);
    };

    const handleGoIdle = () => {
        stopPolling();
        localStorage.removeItem(ACTIVE_KEY);
        setActiveJobId(null);
        setProgress(0);
        setResult(null);
        setErrMsg('');
        setAppState('idle');
    };

    const handleNewJob = () => {
        if (appState === 'processing' || appState === 'uploading') {
            handleCancel();
        } else {
            handleGoIdle();
        }
    };

    const handleSelectJob = (jobId) => {
        const job = jobs.find(j => String(j.job_id) === jobId);
        if (!job) return;

        setActiveJobId(jobId);

        if (job.status === 'completed' && job.result) {
            stopPolling();
            localStorage.removeItem(ACTIVE_KEY);
            setResult(job.result);
            setAppState('done');
            return;
        }
        if (job.status === 'failed') {
            stopPolling();
            localStorage.removeItem(ACTIVE_KEY);
            setErrMsg(job.error_message || 'An unknown error occurred.');
            setAppState('error');
            return;
        }
        if (job.status === 'processing') {
            localStorage.setItem(ACTIVE_KEY, jobId);
            setProgress(job.progress ?? 0);
            setAppState('processing');
            beginPolling(jobId);
            return;
        }
        if (job.status === 'canceled') {
            stopPolling();
            localStorage.removeItem(ACTIVE_KEY);
            setAppState('idle');
        }
    };

    const handleDeleteJob = async (jobId) => {
        const job = jobs.find(j => String(j.job_id) === jobId);
        if (!job || job.status === 'processing') return;

        if (!window.confirm('Delete this job from history?')) return;

        try {
            await deleteJob(jobId);
        } catch (e) {
            setErrMsg(e.message || 'Could not delete job.');
            setAppState('error');
            return;
        }

        saveJobIds(loadJobIds().filter(id => id !== jobId));
        const meta = loadJobsMeta();
        delete meta[jobId];
        localStorage.setItem(JOBS_META_KEY, JSON.stringify(meta));
        setJobs(prev => prev.filter(j => String(j.job_id) !== jobId));

        if (activeJobId === jobId) {
            stopPolling();
            localStorage.removeItem(ACTIVE_KEY);
            setActiveJobId(null);
            setResult(null);
            setErrMsg('');
            setAppState('idle');
        }
    };

    const mainContent = () => {
        switch (appState) {
            case 'uploading':
            case 'idle':
                return <UploadView onSubmit={handleSubmit} />;
            case 'processing':
                return <ProcessingView progress={progress} onReset={handleCancel} isCanceling={isCanceling} />;
            case 'done':
                return <DoneView result={result} onReset={handleGoIdle} />;
            case 'error':
                return <ErrorView message={errMsg} onReset={handleGoIdle} />;
            default:
                return <UploadView onSubmit={handleSubmit} />;
        }
    };

    return (
        <div className="flex h-screen overflow-hidden">
            <Sidebar
                jobs={jobs}
                activeJobId={activeJobId}
                onNewJob={handleNewJob}
                onSelectJob={handleSelectJob}
                onDeleteJob={handleDeleteJob}
            />
            {mainContent()}
        </div>
    );
}

// ─── Mount ────────────────────────────────────────────────────────────────────
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
